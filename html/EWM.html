<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR EWM - Montagem docol 4</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        /* Layout dos gráficos */
        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 5px;
            margin-bottom: 20px;
        }

        /* Layout dos dois gráficos de barras */
        .bar-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        .bar {
            background-color: #ffffff;
            color: #3d3d3d;
            padding: 5px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            height: 30vh;
        }

        /* Largura de 30% para bar1 */
        .bar1 {
            width: 30%;
        }

        /* Largura de 70% para bar2 */
        .bar2 {
            width: 70%;
        }

        canvas {
            max-width: 100%;
        }

        /* Outros estilos existentes */
        .dashboard {
            background-color: #ffffff;
            color: rgb(31, 31, 31);
            padding: 5px;
            flex: 1 1 calc(10% - 40px);
            min-width: 300px;
            max-width: 20%;
            text-align: center;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }


        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            text-align: center;
            font-size: 8px;
            padding: 3px;
            border: 1px solid #8b8b8b;
        }

        tr:nth-child(even) {
            background-color: #00a8e02c;
        }

        @media (max-width: 800px) {
            .dashboard {
                flex: 1 1 100%;
            }

            .bar1, .bar2 {
                width: 100%;
            }
        }
        .hidden {
            display: none;
        }
    </style>
</head>

<body>
<!----------------------------------------------------------------------------------------------------------------------------------------------------------->  
    <h1>MONITOR EWM - Montagem docol 4</h1>
<!----------------------------------------------------------------------------------------------------------------------------------------------------------->  
    <!-- Gráficos de Barras -->
    <div class="bar-container">
        <div class="bar bar1">
            <canvas id="bar1"></canvas>
        </div>
        <div class="bar bar2">
            <canvas id="bar2"></canvas>
        </div>
    </div>
<!----------------------------------------------------------------------------------------------------------------------------------------------------------->  
    <!-- Dashboards com gráficos de pizza e grid de dados -->
    <div class="dashboard-container" id="dashboardContainer"></div>
<!----------------------------------------------------------------------------------------------------------------------------------------------------------->
    <script>
//-------------------------------------------------------------------------------------------------------------------------------------------------------
// Certifique-se de que o código só executa após o DOM estar carregado completamente
        window.onload = function() {
            atualizarDados()
            setInterval(atualizarDados, 1 * 60 * 1000); // 5 minutos * 60 segundos * 1000 milissegundos
        };

// Adicione uma variável global para armazenar os gráficos para serem destruídos posteriormente
let chartInstances = [];

// Função para destruir gráficos existentes antes de criar novos
function clearCharts() {
    chartInstances.forEach(chart => chart.destroy());
    chartInstances = []; // Limpa a lista de gráficos
}

// Função para atualizar os dados e gráficos
function atualizarDados() {
    // Destruir gráficos e limpar dashboards antes de recriar
    clearCharts();
    dashboardContainer.innerHTML = ''; // Limpa o contêiner dos dashboards

    // Função para inicializar os gráficos após carregar os dados
    loadData().then(() => {
        // Após carregar os dados, inicialize os gráficos
        initializeCharts();
        updateBar1ChartWithTotals();
    }).catch(error => {
        console.error('Erro ao carregar os dados:', error);
    });
}
//--------------------------------------------------------------------------------------------------------------------------------------------------------->
        const dashboards = [
            { title: "1001651010 - Célula VD", chartId: "chart1" },
            { title: "1001651020 - Célula Reg. Gaveta", chartId: "chart2" },
            { title: "1001651030 - Montagem DocolMatic", chartId: "chart3" },
            { title: "1001651040 - Cél Mont Pertutti", chartId: "chart4" },
            { title: "1001651050 - Montagem Geral", chartId: "chart5" },
            { title: "1001651060 - Emb Acab VD", chartId: "chart6" },
            { title: "1001651070 - Embalagem Chuveiros", chartId: "chart7" },
            { title: "1001651080 - Embalagem Cozinha", chartId: "chart8" },
            { title: "1001651090 - Emb Luxo/Especiais", chartId: "chart9" },
            { title: "1001651100 - Montagem/Emb Acess", chartId: "chart10" },
            { title: "1001651110 - Cél Montagem Modular", chartId: "chart11" },
        ];

        const dashboardContainer = document.getElementById('dashboardContainer');

        const extractCostCenterNumber = (title) => {
            return title.split(' - ')[0];
        };
//-------------------------------------------------------------------------------------------------------------------------------------------------------
// Função para carregar os dados
// Função para carregar os dados com parâmetro para evitar cache
async function loadData() {
    try {
        const response = await fetch(`/GDM/json/EWM.json?timestamp=${new Date().getTime()}`); // Caminho para o seu arquivo JSON
        if (!response.ok) {
            throw new Error(`Erro ao buscar dados: ${response.status}`);
        }
        const csvData = await response.json(); // Carrega o JSON
        console.log("Dados carregados:", csvData); // Verifique se os dados estão corretos

        dashboards.forEach((dashboard, index) => {
            const costCenterNumber = extractCostCenterNumber(dashboard.title);
            const filteredData = csvData.filter(data => data.centroCusto === costCenterNumber);

            const html = `
                <div class="dashboard">
                    <h3>${dashboard.title}</h3>
                    <canvas id="${dashboard.chartId}"></canvas>
                    <table>
                        <thead>
                            <tr>
                                <th>Centro Trabalho</th>
                                <th class="hidden">Número do centro de custo</th> <!-- Oculta a coluna no cabeçalho -->
                                <th>Meta/Dia</th>
                                <th>Em Produção</th>
                                <th>Em Preparação</th>
                                <th>Para Criar Tarefas</th>
                                <th>5</th>
                                <th>7</th>
                                <th>10</th>
                                <th>11</th>
                                <th>12</th>
                                <th>14</th>
                            </tr>
                        </thead>
                        <tbody id="grid-row-${index}">
                            ${filteredData.map(data => `
                                <tr>
                                    <td>${data.centroTrabalho}</td>
                                    <td class="hidden">${data.centroCusto}</td> <!-- Oculta a coluna centroCusto -->
                                    <td>${data.metaDia}</td>
                                    <td>${data.emProducao}</td>
                                    <td>${data.emPreparacao}</td>
                                    <td>${data.paraCriarTarefas}</td>
                                    <td>${data.M5}</td>
                                    <td>${data.M7}</td>
                                    <td>${data.M10}</td>
                                    <td>${data.M11}</td>
                                    <td>${data.M12}</td>
                                    <td>${data.M14}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
            dashboardContainer.innerHTML += html;
        });
    } catch (error) {
        console.error('Erro ao carregar o JSON:', error);
    }
}
//-------------------------------------------------------------------------------------------------------------------------------------------------------
        const chartIds = dashboards.map(dashboard => dashboard.chartId);
        const getGridDataForChart = (index) => {
            const rows = document.querySelectorAll(`#grid-row-${index} tr`);
            let totalProduzido = 0;
            let totalPreparacao = 0;
            let totalmetaDia = 0;

            rows.forEach(row => {
                if (row.cells.length > 4) {
                    totalmetaDia += parseFloat(row.cells[2].textContent) || 0; // Coluna "Meta dia"
                    totalProduzido += parseFloat(row.cells[3].textContent) || 0; // Coluna "Em Produção"
                    totalPreparacao += parseFloat(row.cells[4].textContent) || 0; // Coluna "Em Preparação"
                }
            });

            return [totalProduzido, totalPreparacao, totalmetaDia];
        };
//-------------------------------------------------------------------------------------------------------------------------------------------------------
        const createChartData = (dataValues) => ({
            labels: ['Em Produção', 'Em Preparação', 'Meta dia'],
            datasets: [{
                data: dataValues,
                backgroundColor: ['#028037', '#842a01e4', '#00a9e0'],
            }]
        });

        const createChartConfig = (dataValues) => ({
            type: 'pie', // Define o tipo de gráfico como pizza
            data: createChartData(dataValues),
            options: {
                responsive: true, // Torna o gráfico responsivo
                plugins: {
                    datalabels: {
                        color: '#fff', // Cor dos rótulos
                        formatter: (value) => `${value} PÇ`, // Formato do rótulo (percentual)
                        anchor: 'center',
                        align: 'center',
                        font: {
                            size: 14,
                            weight: 'bold'
                        }
                    }
                }
            },
            plugins: [ChartDataLabels] // Ativa o plugin de rótulos
        });
//-------------------------------------------------------------------------------------------------------------------------------------------------------
        // Ajuste a função initializeCharts para armazenar instâncias dos gráficos
        function initializeCharts() {
            chartIds.forEach((id, index) => {
                const data = getGridDataForChart(index);
                const ctx = document.getElementById(id);
                if (ctx) { 
                    // Crie um gráfico e armazene a instância na lista
                    const newChart = new Chart(ctx, createChartConfig(data));
                    chartInstances.push(newChart); // Armazena a instância para destruí-la posteriormente
                }
            });
        }
//-------------------------------------------------------------------------------------------------------------------------------------------------------
// Função para calcular os totais de todas as tabelas
const getTotalGridData1 = () => {
    let totalProduzido = 0;
    let totalPreparacao = 0;
    let totalmetaDia = 0;

    dashboards.forEach((_, index) => {
        const rows = document.querySelectorAll(`#grid-row-${index} tr`);
        rows.forEach(row => {
            if (row.cells.length > 4) {
                totalmetaDia += parseFloat(row.cells[2].textContent) || 0; // Coluna "Meta dia"
                totalProduzido += parseFloat(row.cells[3].textContent) || 0; // Coluna "Em Produção"
                totalPreparacao += parseFloat(row.cells[4].textContent) || 0; // Coluna "Em Preparação"
            }
        });
    });

    return [totalProduzido, totalPreparacao, totalmetaDia];
};

// Função para calcular os totais de todas as tabelas
const getTotalGridData2 = () => {
    let M5 = 0;
    let M7 = 0;
    let M10 = 0;
    let M11 = 0;
    let M12 = 0;
    let M14 = 0;

    dashboards.forEach((_, index) => {
        const rows = document.querySelectorAll(`#grid-row-${index} tr`);
        rows.forEach(row => {
            if (row.cells.length > 4) {
                M5 += parseFloat(row.cells[6].textContent) || 0; // 5 - Vagão Incompleto - Enviado sem transferência"
                M7 += parseFloat(row.cells[7].textContent) || 0; // 7 - Vagão Incompleto - Aguardando Finalizar coleta"
                M10 += parseFloat(row.cells[8].textContent) || 0; // 10 - Fazendo coleta - Vagão não Iniciado"
                M11 += parseFloat(row.cells[9].textContent) || 0; // 11 - Fazendo coleta - Vagão Iniciado"
                M12 += parseFloat(row.cells[10].textContent) || 0; // 12 - Coleta não Iniciada"
                M14 += parseFloat(row.cells[11].textContent) || 0; // 14 - Vagão Completo - Transferido"
            }
        });
    });

    return [M5, M7, M10, M11, M12, M14];
};
//-------------------------------------------------------------------------------------------------------------------------------------------------------
// Atualize as funções de criação dos gráficos para armazenar instâncias dos gráficos
function updateBar1ChartWithTotals() {
    const [totalProduzido, totalPreparacao, totalmetaDia] = getTotalGridData1();
    const [M5, M7, M10, M11, M12, M14] = getTotalGridData2();
    const ctxBar1 = document.getElementById('bar1');
    const ctxBar2 = document.getElementById('bar2');

    if (ctxBar1) { 
        const configBar1 = {
            type: 'bar',
            data: {
                labels: ['Em Produção', 'Em Preparação', 'Meta dia'],
                datasets: [{
                    label: 'TOTAL DA PRODUÇÃO',
                    data: [totalProduzido, totalPreparacao, totalmetaDia],
                    backgroundColor: ['#028037', '#842a01e4', '#00a9e0'],
                    borderColor: ['#028037', '#842a01e4', '#00a9e0'],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        enabled: true,
                        callbacks: {
                            label: function(tooltipItem) {
                                return `Valor: ${tooltipItem.raw}`; // Personaliza o texto do tooltip
                            }
                        }
                    },
                    datalabels: {
                        display: true,
                        anchor: 'end',  // Alinha o rótulo na extremidade das barras
                        align: 'top',   // Posiciona o rótulo no topo da barra
                        offset: -5,    // Adiciona um pequeno deslocamento para ajustar a posição
                        color: '#000',
                        font: {
                            size: 14,
                            weight: 'bold'
                        },
                        formatter: (value, context) => `${value}`
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true, // Inicia o eixo Y do zero
                        ticks: {
                            stepSize: 10000 // Incremento do eixo Y
                        }
                    }
                }
            },
            plugins: [ChartDataLabels]
        };

        const chartBar1 = new Chart(ctxBar1, configBar1);
        chartInstances.push(chartBar1); // Armazena a instância para destruí-la posteriormente
    }

    if (ctxBar2) { 
        const configBar2 = {
            type: 'bar',
            data: {
                labels: [
                    '5 - Vagão Incompleto - Enviado sem transferência',
                    '7 - Vagão Incompleto - Aguardando Finalizar coleta',
                    '10 - Fazendo coleta - Vagão não Iniciado',
                    '11 - Fazendo coleta - Vagão Iniciado',
                    '12 - Coleta não Iniciada',
                    '14 - Vagão Completo - Transferido'
                ],
                datasets: [{
                    label: 'PRINCIPAIS STATUS DO VAGÃO',
                    data: [M5, M7, M10, M11, M12, M14],
                    backgroundColor: ['#36a2eb', '#36a2eb', '#ff6384', '#ffce56', '#ff6384', '#028037'],
                    borderColor: ['#36a2eb', '#36a2eb', '#ff6384', '#ffce56', '#ff6384', '#028037'],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        enabled: true,
                        callbacks: {
                            label: function(tooltipItem) {
                                return `Valor: ${tooltipItem.raw}`;
                            }
                        }
                    },
                    datalabels: {
                        display: true,
                        anchor: 'end',  // Alinha o rótulo na extremidade das barras
                        align: 'top',   // Posiciona o rótulo no topo da barra
                        offset: -5,    // Adiciona um pequeno deslocamento para ajustar a posição
                        color: '#000',
                        font: {
                            size: 14,
                            weight: 'bold'
                        },
                        formatter: (value, context) => `${value}`
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 50
                        }
                    }
                }
            },
            plugins: [ChartDataLabels]
        };

        const chartBar2 = new Chart(ctxBar2, configBar2);
        chartInstances.push(chartBar2); // Armazena a instância para destruí-la posteriormente
    }
}
//-------------------------------------------------------------------------------------------------------------------------------------------------------
    </script>
</body>

</html>
