                // Usuário não está autenticado; redirecionar para a página de login

/* ======================================================================

            const thirdNumber = userAcess.charAt(0);                

            console.log('Log - 0' + thirdNumber);

        function loadCSS(href) {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
      }

      function loadJS(src, callback) {
          const script = document.createElement('script');
          script.src = src;
          script.onload = callback;
          document.head.appendChild(script);
      }
/* ======================================================================
    Pega o nome do usuário do localStorage (prioridade: nome > nomeUsuario > username > Usuário)
====================================================================== */
    const nomeUsuario =
        localStorage.getItem('nome') ||
        localStorage.getItem('nomeUsuario') ||
        localStorage.getItem('username') ||
        'Usuário';

    // Atualiza apenas o mini menu
    document.getElementById('userMenuName').textContent = nomeUsuario;

    // Alterna o menu ao clicar no botão
    document.getElementById('userMenuBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        const menu = document.getElementById('userMenu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    });

    // Fecha o menu ao clicar fora
    document.addEventListener('click', function() {
        document.getElementById('userMenu').style.display = 'none';
    });
