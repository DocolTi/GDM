/* ===========================================================

function formatarDataLocal(date) {
    const ano = date.getFullYear();
    const mes = String(date.getMonth() + 1).padStart(2, '0');
    const dia = String(date.getDate()).padStart(2, '0');
    const hora = String(date.getHours()).padStart(2, '0');
    const minuto = String(date.getMinutes()).padStart(2, '0');

    return `${ano}-${mes}-${dia}T${hora}:${minuto}`;
}

/* ===========================================================
    NORMALIZA INÍCIO PARA FORMATO DO BANCO
============================================================ */
function normalizarInicioParaBanco(valor) {
    if (!valor) return "";

    // Se já vier no formato BR correto
    if (valor.includes("/") && valor.includes(" ")) {
        return valor.substring(0, 16); // yyyy-MM-dd HH:mm
    }

    // Se vier ISO
    if (valor.includes("T")) {
        const [dataISO, horaISO] = valor.split("T");
        const [ano, mes, dia] = dataISO.split("-");
        const [hora, min] = horaISO.split(":");

        return `${dia}/${mes}/${ano} ${hora}:${min}`;
    }


    return valor;
}

    FUNÇÃO DE SALVAR PARADA (Rápida e Manual)
============================================================ */
async function salvarParada({ modo, maquina, motivo, inicio, obs }) {
    try {
        const url = `${BASE_URL}/gdm_paradas/${maquina}`;

        const payload = {
            inicio: normalizarInicioParaBanco(inicio),
            status_parada: motivo,
            Obs: obs ?? ""
        };

        const resp = await fetch(url, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (!resp.ok) throw new Error("Erro ao registrar parada.");

        showSuccessMessage("18");
        fecharPopupParada();
        await carregarProducaoCT();
        carregarPainelMes();

    } catch (erro) {
        console.error("Erro no salvamento:", erro);
        alert("Falha ao salvar parada.");
    }
}

/* ===========================================================
    FORMATA ÚLTIMO APONTAMENTO
============================================================ */
function formatarUltimoApont(dtUlt, hrUlt = "") {
    if (!dtUlt) return "-";

    // Caso dtUlt seja objeto Date (campo "inicio" do gdm_monitor_paradas)
    if (dtUlt instanceof Date) {
        if (isNaN(dtUlt.getTime())) return "-";

        const dia = String(dtUlt.getDate()).padStart(2, "0");
        const mes = String(dtUlt.getMonth() + 1).padStart(2, "0");
        const ano = dtUlt.getFullYear();
        const hora = String(dtUlt.getHours()).padStart(2, "0");
        const min  = String(dtUlt.getMinutes()).padStart(2, "0");

        return `${dia}/${mes}/${ano} ${hora}:${min}`;
    }

    // Converte para string
    dtUlt = String(dtUlt).trim();
    hrUlt = String(hrUlt).trim();

    /* ===========================================================
       CASO 1 — Data BR completa: "27/11/2025 14:22:00"
    =========================================================== */
    if (dtUlt.includes("/") && dtUlt.includes(":")) {
        return dtUlt.substring(0, 16); // sem segundos
    }

    /* ===========================================================
       CASO 2 — Data BR + hora separada
    =========================================================== */
    if (dtUlt.includes("/") && hrUlt) {
        return `${dtUlt} ${hrUlt.substring(0, 5)}`;
    }

    /* ===========================================================
       CASO 3 — ISO do SQL: "2025-12-07T00:00:00.000Z"
       NÃO usar new Date() para evitar converter para UTC-3!
    =========================================================== */
    if (dtUlt.includes("T")) {
        const [dataISO, tempoISO] = dtUlt.split("T");
        let [ano, mes, dia] = dataISO.split("-");

        let hora = "";
        let min = "";

        // Se a hora vem separada no banco
        if (hrUlt) {
            const parts = hrUlt.substring(0, 5).split(":");
            hora = parts[0];
            min  = parts[1];
        } else {
            // Hora vinda do próprio campo ISO
            [hora, min] = tempoISO.split(":");
        }

        return `${dia}/${mes}/${ano} ${hora}:${min}`;
    }

    return "-";
}
/* ===========================================================
    PARSE DATA/HORA BR PARA OBJETO DATE
============================================================ */
function parseDataHoraBR(dataStr, horaStr = "") {
    if (!dataStr) return null;

    dataStr = String(dataStr).trim();
    horaStr = String(horaStr).trim();

    // Se a data já vier com a hora completa → BR padrão
    if (dataStr.includes("/") && dataStr.includes(":")) {
        const [d, m, yHour] = dataStr.split("/");

        // separa ano da hora
        const ano = yHour.substring(0, 4);
        let hora = "00:00";

        const partesHora = yHour.substring(5).trim();
        if (partesHora.includes(":"))
            hora = partesHora.substring(0, 5);

        return new Date(`${ano}-${m}-${d}T${hora}:00`);
    }

    // Se veio só a data BR (dd/MM/yyyy)
    if (dataStr.includes("/")) {
        const [d, m, y] = dataStr.split("/");
        let hora = "00:00";

        if (horaStr.includes(":")) {
            hora = horaStr.substring(0, 5);
        }

        return new Date(`${y}-${m}-${d}T${hora}:00`);
    }

    // Caso ISO
    if (dataStr.includes("T")) {
        return new Date(dataStr);
    }

    return null;
}

/* ===========================================================
   POPUP TOOLTIP NOS CARDS
============================================================ */

// cria o tooltip na página uma única vez
const tooltip = document.createElement("div");
tooltip.className = "tooltip-box";
document.body.appendChild(tooltip);

// Mostra tooltip
// Mostra tooltip com correção automática de borda
function mostrarTooltip(event, conteudo) {
    tooltip.innerHTML = conteudo;
    tooltip.classList.add("visible");

    posicionarTooltip(event);
}

// Move tooltip acompanhando mouse
function moverTooltip(event) {
    posicionarTooltip(event);
}

// Ajusta dinamicamente evitando bordas da tela
function posicionarTooltip(event) {
    const padding = 20; // margem da borda da tela
    const w = tooltip.offsetWidth;
    const h = tooltip.offsetHeight;

    let left = event.pageX + 20;
    let top = event.pageY + 20;

    // bateu na borda direita → joga para a esquerda
    if ((left + w + padding) > window.innerWidth) {
        left = event.pageX - w - 20;
    }

    // bateu na borda esquerda → joga para a direita
    if (left < padding) {
        left = padding;
    }

    // bateu na borda inferior → sobe o tooltip
    if ((top + h + padding) > window.innerHeight) {
        top = event.pageY - h - 20;
    }

    // bateu no topo → limita
    if (top < padding) {
        top = padding;
    }

    tooltip.style.left = left + "px";
    tooltip.style.top = top + "px";
}

// Esconde tooltip
function esconderTooltip() {
    tooltip.classList.remove("visible");
}


/* ===========================================================
   CALCULAR GRID DINÂMICO
   RESPONSIVIDADE TOTAL (TUDO NA TELA)
============================================================ */
function ajustarGridAutoFit() {
    const grid = document.getElementById("painelMesGrid");
    const total = centrosTrabalho.length;

    const largura = grid.clientWidth;
    const altura = grid.clientHeight;
    const gap = 12; // gap do CSS

    let melhorCard = 0;
    let melhorCol = 1;

    for (let col = 1; col <= total; col++) {
        const linhas = Math.ceil(total / col);

        // tamanho baseado na largura
        const cardW = (largura - gap * (col - 1)) / col;

        // tamanho baseado na altura
        const cardH = (altura - gap * (linhas - 1)) / linhas;

        // o card deve caber nas duas dimensões
        const cardSize = Math.min(cardW, cardH);

        // seleciona o maior cardSize possível que caiba na tela
        if (cardSize > melhorCard) {
            melhorCard = cardSize;
            melhorCol = col;
        }
    }

    // aplica colunas
    grid.style.gridTemplateColumns = `repeat(${melhorCol}, var(--card-size))`;

    // aplica o tamanho final dos cards
    document.documentElement.style.setProperty("--card-size", melhorCard + "px");
}

============================================================ */

function atualizarVisualSwitchPalete() {
    const sw = document.getElementById("switchLinhaParada");
    const txt = document.getElementById("switchStatusPaleteTexto");

    if (!sw || !txt) return;

    if (sw.checked) {
        txt.textContent = "Fechado";
        txt.classList.add("ativo");
    } else {
        txt.textContent = "Aberto";
        txt.classList.remove("ativo");
    }
}
/* ===========================================================
    EVENTO DE CHANGE DO SWITCH DE PALETE
============================================================ */
document.getElementById("switchLinhaParada").addEventListener("change", async function () {
    atualizarVisualSwitchPalete();

    const maquina = document.getElementById("centro_trabalho").value;
    if (!maquina) {
        alert("Selecione uma máquina antes de alterar o fechamento do palete.");
        this.checked = false;
        atualizarVisualSwitchPalete();
        return;
    }

    await salvarStatusPalete(maquina, this.checked);
});

/* ===========================================================
    FUNÇÃO DE SALVAR PARADA (Rápida e Automático)
============================================================ */

async function salvarStatusPalete(maquina, fechado) {
    try {
        const url = `${BASE_URL}/gdm_paradas/${maquina}`;

        const payload = {
            status: fechado ? "fechado" : "aberto"
        };

        const resp = await fetch(url, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (!resp.ok) throw new Error("Erro ao salvar status do palete.");

        await carregarProducaoCT();
        await carregarPainelMes();

    } catch (erro) {
        console.error("Erro ao salvar status do palete:", erro);
        alert("Falha ao salvar status do palete.");
    }
}

function preencherSelect(id, lista) {
    const sel = document.getElementById(id);

    sel.innerHTML = '<option value="">Selecione...</option>';

        opt.value = item;
        opt.textContent = item;
        sel.appendChild(opt);
    });
}
