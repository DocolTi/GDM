/* ======================================================================
   FORM — Preenche campos do formulário (yyyy-mm-dd + HH:mm)
====================================================================== */
function preencherDataHoraAtual() {
  const agora = new Date();
  const ano = agora.getFullYear();
  const mes = String(agora.getMonth() + 1).padStart(2, '0');
  const dia = String(agora.getDate()).padStart(2, '0');
  const horas = String(agora.getHours()).padStart(2, '0');
  const minutos = String(agora.getMinutes()).padStart(2, '0');

  document.getElementById('date').value = `${ano}-${mes}-${dia}`;
  document.getElementById('hora').value = `${horas}:${minutos}`;
}

/* ======================================================================
   UTIL — Retorna timestamp BR (dd/MM/yyyy HH:mm:ss)
====================================================================== */
function getTimestampBR() {
  const agora = new Date();
  const dd = String(agora.getDate()).padStart(2, '0');
  const mm = String(agora.getMonth() + 1).padStart(2, '0');
  const yyyy = agora.getFullYear();
  const hh = String(agora.getHours()).padStart(2, '0');
  const min = String(agora.getMinutes()).padStart(2, '0');
  const ss = String(agora.getSeconds()).padStart(2, '0');
  return `${dd}/${mm}/${yyyy} ${hh}:${min}:${ss}`;
}
/* ======================================================================
   HELPERS COMUNS - HISTÓRICO
====================================================================== */
function parseBRDateTime(str) {
  // str: "dd/MM/yyyy HH:mm:ss" -> Date
  const [dd, mm, rest] = str.split('/');
  const [yyyy, time] = rest.split(' ');
  const [HH, MIN, SS] = time.split(':');
  return new Date(+yyyy, +mm - 1, +dd, +HH, +MIN, +SS);
}

function formatBR(dt) {
  if (!dt) return '-';
  const dd = String(dt.getDate()).padStart(2, '0');
  const mm = String(dt.getMonth() + 1).padStart(2, '0');
  const yyyy = dt.getFullYear();
  const HH = String(dt.getHours()).padStart(2, '0');
  const MIN = String(dt.getMinutes()).padStart(2, '0');
  const SS = String(dt.getSeconds()).padStart(2, '0');
  return `${dd}/${mm}/${yyyy} ${HH}:${MIN}:${SS}`;
}

function formatSecondsToHMS(totalSec) {
  totalSec = Math.max(0, Math.floor(totalSec || 0));
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* ======================================================================
   LISTA — RENDERIZAÇÃO EM TABELA (cria tabela e cabeçalho)
====================================================================== */
function renderizarComoLista(data) {
    const pedidosContainer = document.getElementById('pedidosContainer');
    pedidosContainer.innerHTML = ''; // Limpa o contêiner

    /* ------------------------------------------------------------------
        ESTADO DE ORDENAÇÃO ATUAL
    ------------------------------------------------------------------ */
    let ordenacaoAtual = { coluna: 'HRpedido', ascendente: true };

    /* ------------------------------------------------------------------
        UI: FUNÇÃO PARA CRIAR ÍCONE DE ORDENAÇÃO (↑ / ↓)
    ------------------------------------------------------------------ */
    function criarIconeOrdenacao(ascendente) {
        return ascendente ? '↑' : '↓';
    }

    /* ------------------------------------------------------------------
        ORDENAÇÃO: FUNÇÃO QUE REORDENA E RECONSTROI O TBODY
        - Define coluna alvo
        - Inverte direção quando clica na mesma coluna
        - Converte tipos especiais (data/número)
        - Atualiza ícones dos <th>
    ------------------------------------------------------------------ */
    function atualizarTabela(propriedade) {
        // Mapeia o atributo 'data-propriedade' → campo do objeto 'data'
        const coluna = {
        'id': 'Id',
        'HRpedido': 'HRpedido',
        'vagao': 'vagao',
        'Ctrab': 'Ctrab',
        'material': 'material',
        'op': 'op',
        'date': 'date',
        'horario': 'horario',
        'status': 'status',
        // Adicione mapeamentos adicionais conforme necessário
        }[propriedade] || propriedade;

        // Alterna direção se clicar na mesma coluna; senão reinicia ascendente
        if (ordenacaoAtual.coluna === coluna) {
        ordenacaoAtual.ascendente = !ordenacaoAtual.ascendente;
        } else {
        ordenacaoAtual = { coluna: coluna, ascendente: true };
        }

        // Ordena array 'data' in-place
        data.sort((a, b) => {
        let valorA = a[coluna];
        let valorB = b[coluna];

        // Tratamento especial: datas e números
        if (coluna === 'HRpedido') {
            valorA = new Date(valorA);
            valorB = new Date(valorB);
        } else if (coluna === 'Id') {
            valorA = +valorA;
            valorB = +valorB;
        }

        if (valorA < valorB) return ordenacaoAtual.ascendente ? -1 : 1;
        if (valorA > valorB) return ordenacaoAtual.ascendente ? 1 : -1;
        return 0;
        });

        // Reconstrói o corpo da tabela (tbody)
        tbody.innerHTML = '';
        data.forEach(solicitacao => {
        const row = document.createElement('tr');
        row.className = `status${solicitacao.status.toLowerCase()}`;
        row.innerHTML = `
            <td>${solicitacao.Id}</td>
            <td>${solicitacao.HRpedido}</td>
            <td>${solicitacao.vagao}</td>
            <td>${solicitacao.Ctrab}</td>
            <td>${solicitacao.material}</td>
            <td>${solicitacao.op}</td>
            <td>${solicitacao.date}</td>
            <td>${solicitacao.horario}</td>
            <td>${solicitacao.status}</td>
        `;
        tbody.appendChild(row);
        });

        // Atualiza ícones de ordenação nos cabeçalhos
        document.querySelectorAll('th').forEach(header => {
        const propriedadeHeader = header.getAttribute('data-propriedade');
        if (propriedadeHeader) {
            header.innerHTML = propriedadeHeader + (
            coluna === propriedadeHeader ? criarIconeOrdenacao(ordenacaoAtual.ascendente) : ''
            );
        }
        });
    }

    /* ------------------------------------------------------------------
        CONSTRUÇÃO DO <table> + <thead> + <tbody>
    ------------------------------------------------------------------ */
    const tabela = document.createElement('table');
    tabela.innerHTML = `
        <thead>
        <tr>
            <th data-propriedade="Id">Id</th>
            <th data-propriedade="HRpedido">Hora pedido</th>
            <th data-propriedade="vagao">vagao</th>
            <th data-propriedade="Ctrab">Ctrab</th>
            <th data-propriedade="material">material</th>
            <th data-propriedade="op">op</th>
            <th data-propriedade="date">date</th>
            <th data-propriedade="horario">horario</th>
            <th data-propriedade="status">status</th>
        </tr>
        </thead>`;
    const tbody = document.createElement('tbody');
    tabela.appendChild(tbody);
    pedidosContainer.appendChild(tabela);

    /* ------------------------------------------------------------------
        HEADERS CLICÁVEIS: ADICIONA LISTENERS PARA ORDENAR
    ------------------------------------------------------------------ */
    tabela.querySelectorAll('th').forEach(header => {
        header.addEventListener('click', () => {
        const propriedade = header.getAttribute('data-propriedade');
        if (propriedade) atualizarTabela(propriedade.toLowerCase());
        });
    });

    /* ------------------------------------------------------------------
        ORDENAÇÃO INICIAL
    ------------------------------------------------------------------ */
    atualizarTabela('HRpedido'); // Ordena inicialmente por 'HRpedido'
}

		---------------------------------------------------------------- */
		const EWM_KEYS = ['aguardando','preparando','coletado','rota','divergente','cancelado','finalizado'];
		const MOT_KEYS = ['esc','ger','montagem','rota'];

		const selecionados = JSON.parse(localStorage.getItem('statusSelecionados')) || [];
		const selEWM = selecionados.filter(v => EWM_KEYS.includes(v));
		const selMOT = selecionados.filter(v => MOT_KEYS.includes(v));

		// listas efetivas (quando nada é selecionado em um grupo, esse grupo não restringe)
		const allowMOT = selMOT.length ? selMOT : MOT_KEYS;
		const allowEWM = selEWM.length ? selEWM : EWM_KEYS;

		// 🔒 Bloqueio padrão para EWM (não mostrar Cancelado/Finalizado a menos que selecionados)
		const BLOCK_BY_DEFAULT = ['cancelado', 'finalizado'];

		});

/* ======================================================================
   VALIDAÇÕES — Campos OP e Material (pinta de vermelho se inválido)
====================================================================== */
function validateOpField() {
  const opEl = document.getElementById('op');
  const ok = /^\d{10}$/.test(opEl.value);
  // pinta de vermelho somente se o usuário digitou algo e está inválido
  opEl.classList.toggle('input-error', !ok && opEl.value.length > 0);
  return ok;
}

// genérica: pinta de vermelho se não bater com o tamanho exigido
function validateDigitsField(el, len) {
  const re = new RegExp('^\\d{' + len + '}$');
  const ok = re.test(el.value);
  el.classList.toggle('input-error', !ok && el.value.length > 0);
  return ok;
}

function validateOpField() {
  return validateDigitsField(document.getElementById('op'), 10);
}

function validateMaterialField() {
  return validateDigitsField(document.getElementById('material'), 11);
}

/* ======================================================================
   FORM — Criação de nova solicitação (submit)
====================================================================== */
document.getElementById('formVagao').addEventListener('submit', async function(event) {
    event.preventDefault(); // Impede envio padrão
    // Validações OP e Material
    const okOp  = validateOpField();
    const okMat = validateMaterialField();

    if (!(okOp && okMat)) {
        e.preventDefault();
        (okOp ? document.getElementById('material') : document.getElementById('op')).focus();
        return;
    }

    // Captura valores
    const Ctrab    = document.getElementById('Ctrab').value;
    const op       = document.getElementById('op').value;
    const qtd_op   = document.getElementById('qtd_op').value;
    const material = document.getElementById('material').value;
    const qtd_mat  = document.getElementById('qtd_mat').value;
    const date     = document.getElementById('date').value;
    const hora     = document.getElementById('hora').value;
    const motivo   = document.getElementById('motivosSSV').value;
    const obs      = document.getElementById('observacao').value;
    const prior    = document.getElementById('switchLinhaParada').checked ? 1 : 0;

    // Validação simples
    if (!Ctrab || !op || !qtd_op || !material || !qtd_mat || !date || !hora || !motivo) {
        alert('Por favor, preencha todos os campos obrigatórios.');
        return;
    }

    // Gera HRpedido (dd/MM/yyyy HH:mm:ss)
    const agora = new Date();
    const dia   = agora.getDate().toString().padStart(2, '0');
    const mes   = (agora.getMonth() + 1).toString().padStart(2, '0');
    const ano   = agora.getFullYear();
    const hh    = agora.getHours().toString().padStart(2, '0');
    const mm    = agora.getMinutes().toString().padStart(2, '0');
    const ss    = agora.getSeconds().toString().padStart(2, '0');
    const HRpedido = `${dia}/${mes}/${ano} ${hh}:${mm}:${ss}`;

    // Dados fixos
    const login = localStorage.getItem('username') ;
    const status = "Esc";
    const HRfinalizado = "";

    // Objeto a enviar
    const novoSetup = {
        HRpedido, login, Ctrab, op, qtd_op, material, qtd_mat, date,
        motivosSSV: motivo, status, status_EWM: "Aguardando", prior,
        HRfinalizado, motivo, obs
    };

    // Envio
    try {
    const response = await fetch(`${BASE_URL}/gdm_ssv`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(novoSetup)
    });

    if (!response.ok) {
        const payload = await response.json().catch(() => ({}));
        if (response.status === 409) {
            
        showSuccessMessage('17');
//        alert(payload.message || 'Reserva já solicitada para esta OP e Material.');
        return; // não fecha o form nem recarrega
        }
        throw new Error(payload.detalhe || payload.error || 'Erro ao criar solicitação.');
    }
    const data = await response.json();
    console.log('Resposta do servidor:', data);

    showSuccessMessage('1');
    closeForm();
    atualizarDados();
    } catch (error) {
    console.error('Erro ao enviar solicitação:', error);
    alert('Não foi possível criar a solicitação agora.');
    }
});

/* ======================================================================
   A) AÇÕES DE STATUS (MOTIVO) —  FINALIZADO
====================================================================== */
document.getElementById('pedidosContainer').addEventListener('click', function (event) {
  const target = event.target;

  if (target.classList.contains('button-finalizado')) {
    const status = target.textContent.trim();
    const card   = target.closest('.card2');
    if (!card) return console.error('Elemento .card não encontrado.');
    const id = card.querySelector('.info-line')?.textContent.trim();
    if (!id) return console.error('Elemento .info-line não encontrado.');

    // 🔹 gere o timestamp e use na requisição
    const HRfinalizado = getTimestampBR();

    fetch(`${BASE_URL}/gdm_ssv/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, HRfinalizado })
    })
    .then(r => {
      if (r.ok) {
        console.log(`Status atualizado para ${status} com sucesso.`);
        atualizarDados();
        showSuccessMessage('2');
      } else {
        console.error('Erro ao atualizar o status.');
      }
    })
    .catch(err => console.error('Erro ao atualizar o status:', err));
  }
});

/* ======================================================================
   MODAL DE HISTÓRICO — busca no backend e renderiza no overlay
   Observação: exige que existam as funções auxiliares:
     - parseBRDateTime(str) => Date a partir de "dd/MM/yyyy HH:mm:ss"
     - formatBR(date)       => "dd/MM/yyyy HH:mm:ss"
     - formatSecondsToHMS(s) => "HH:MM:SS"
====================================================================== */
async function openHistory(id) {
  const box = document.getElementById('historyContent');

  // Estado "carregando" e exibe o overlay
  box.innerHTML = '<p>Carregando...</p>';
  document.getElementById('historyOverlay').style.display = 'block';

  try {
    // Chama a rota do histórico por ID
    const resp = await fetch(`${BASE_URL}/gdm_ssv/${id}/hist`);
    if (!resp.ok) throw new Error('Falha ao buscar histórico');

    // Resposta JSON: array de eventos (horario, login, status, status_EWM, mensagem)
    const hist = await resp.json();

    // Se não houver eventos, mostra mensagem e sai
    if (!hist || !hist.length) {
      box.innerHTML = '<p>Sem eventos para este registro.</p>';
      return;
    }

    // Monta a lista de eventos (ordem já vem do backend; apenas renderiza)
    const html = hist.map(row => `
      <div class="history-item" style="padding:8px 6px; border-bottom:1px solid #eee;">
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <strong>${row.horario}</strong>
          <span style="opacity:.7;">&bull;</span>
          <span><b>Login:</b> ${row.login || '-'}</span>
          <span style="opacity:.7;">&bull;</span>
          <span><b>Status:</b> ${row.status || '-'} / ${row.status_EWM || '-'}</span>
        </div>
        <div style="margin-top:4px;">
          <span>${row.mensagem || ''}</span>
        </div>
      </div>
    `).join('');
    box.innerHTML = html;

    // === RESUMO: menor horário (primeiro evento), maior horário (último evento) e duração total ===
    let minDt = null, maxDt = null;

    // Converte cada "horario" (string BR) para Date e calcula menor/maior
    for (const r of hist) {
      const dt = parseBRDateTime(r.horario); // usa o campo string "dd/MM/yyyy HH:mm:ss"
      if (!minDt || dt < minDt) minDt = dt;
      if (!maxDt || dt > maxDt) maxDt = dt;
    }

    // Diferenca em segundos entre maior e menor
    const totalSec = (maxDt - minDt) / 1000;

    // Bloco de resumo no rodapé do modal
    const resumoHtml = `
      <div class="history-summary" style="margin-top:10px; padding:10px; border-top:2px solid #ddd;">
        <div><b>Primeiro evento:</b> ${formatBR(minDt)}</div>
        <div><b>Último evento:</b> ${formatBR(maxDt)}</div>
        <div><b>Duração total:</b> ${formatSecondsToHMS(totalSec)}</div>
      </div>
    `;
    // Insere o resumo após a lista
    box.insertAdjacentHTML('beforeend', resumoHtml);

  } catch (e) {
    // Em caso de erro na chamada ou parse do JSON
    console.error(e);
    box.innerHTML = '<p>Não foi possível carregar o histórico.</p>';
  }
}

    const dadosParada = {
        inicio: agora,
        status_parada: motivo || "LINHA PARADA",
        Obs: `Parada automática gerada pelo SSV • Motivo: ${motivo}`
    };
    try {

            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dadosParada)
        });

        if (!resp.ok) {
            console.warn("Falha ao registrar parada automática.");
            return false;
        }

        console.log("Parada automática registrada.");
        return true;

    } catch (e) {
        console.error("Erro parada automática:", e);
        return false;
    }
}

// ===== Modal Exportar (abre ao clicar no botão Exportar) =====
const exportBtn   = document.getElementById('viewExtrairSSV');
const overlayExp  = document.getElementById('exportOverlay');
const formExport  = document.getElementById('exportForm');
const cancelExp   = document.getElementById('cancelExport');
const inputStart  = document.getElementById('expStart');
const inputEnd    = document.getElementById('expEnd');

if (exportBtn) {
    exportBtn.addEventListener('click', () => {
        // datas padrão: últimos 7 dias
        const end   = new Date();
        const start = new Date(); start.setDate(end.getDate() - 7);
        inputEnd.value   = end.toISOString().slice(0,10);
        inputStart.value = start.toISOString().slice(0,10);

        overlayExp.style.display = 'flex';
    });
    }

    cancelExp?.addEventListener('click', () => {
    overlayExp.style.display = 'none';
    });

    formExport?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const start = inputStart.value;
    const end   = inputEnd.value;

    if (!start || !end) return alert('Informe as duas datas.');
    if (start > end)    return alert('Data inicial não pode ser maior que a final.');

    const submitBtn = formExport.querySelector('button[type="submit"]');
    const original  = submitBtn.textContent;
    submitBtn.disabled = true; submitBtn.textContent = 'Gerando...';

    try {
        const resp = await fetch(`${BASE_URL}/export-ssv-xlsx?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`);
        if (!resp.ok) throw new Error(await resp.text());

        const blob = await resp.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url;
        a.download = `ssv_${start}_a_${end}.xlsx`;
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
        a.remove();

        overlayExp.style.display = 'none';
    } catch (err) {
        console.error('Erro export:', err);
        alert('Não foi possível exportar agora. Tente novamente.');
    } finally {
        submitBtn.disabled = false; submitBtn.textContent = original;
    }
});

/* ===========================================================
    FORMATA DATA PARA INPUT DATETIME-LOCAL
============================================================ */
function formatarDataLocal(date) {
    const ano = date.getFullYear();
    const mes = String(date.getMonth() + 1).padStart(2, '0');
    const dia = String(date.getDate()).padStart(2, '0');
    const hora = String(date.getHours()).padStart(2, '0');
    const minuto = String(date.getMinutes()).padStart(2, '0');

    return `${ano}-${mes}-${dia}T${hora}:${minuto}`;
}

/* ===========================================================
    NORMALIZA INÍCIO PARA FORMATO DO BANCO
============================================================ */
function normalizarInicioParaBanco(valor) {
    if (!valor) return "";

    // Se já vier no formato BR correto
    if (valor.includes("/") && valor.includes(" ")) {
        return valor.substring(0, 16); // yyyy-MM-dd HH:mm
    }

    // Se vier ISO
    if (valor.includes("T")) {
        const [dataISO, horaISO] = valor.split("T");
        const [ano, mes, dia] = dataISO.split("-");
        const [hora, min] = horaISO.split(":");

        return `${dia}/${mes}/${ano} ${hora}:${min}`;
    }


    return valor;
}

/* ===========================================================
    FUNÇÃO DE SALVAR PARADA (Rápida e Manual)
============================================================ */
async function salvarParada({ modo, maquina, motivo, inicio, obs }) {
    try {
        let url = `${BASE_URL}/gdm_paradas/${maquina}`;

        // Se não veio início → parada rápida → gera agora
        if (!inicio) {
            const d = new Date();
            inicio = normalizarInicioParaBanco(inicio)
        }

        const payload = {
            inicio: normalizarInicioParaBanco(inicio),
            status_parada: motivo,
            Obs: obs || ""
        };

        const resp = await fetch(url, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });


        if (!resp.ok) throw new Error("Erro ao registrar parada.");

        showSuccessMessage("18");
        fecharPopupParada();

    } catch (erro) {
        console.error("Erro no salvamento:", erro);
    }
}
